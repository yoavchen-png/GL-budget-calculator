<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Calculate Google Ads campaign budgets based on chained automated rules." />
    <meta name="theme-color" content="#fafaf9" />
    <meta name="color-scheme" content="light" />

    <title>Budget Calculator</title>

    <link
      rel="icon"
      type="image/svg+xml"
      href="data:image/svg+xml;utf8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%231c1917'/%3E%3Cpath d='M4 22 L10 22 L10 17 L16 17 L16 11 L22 11 L22 14 L28 14' stroke='%232563eb' stroke-width='2.5' fill='none' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E"
    />

    <style>
      html,
      body {
        margin: 0;
        padding: 0;
      }
      body {
        background: #fafaf9;
        color: #1c1917;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      #root {
        min-height: 100vh;
      }

      /* Boot state — shown briefly before React mounts */
      .boot {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        min-height: 100vh;
        color: #a8a29e;
        font-size: 12px;
        letter-spacing: 0.04em;
      }
      .boot-dot {
        width: 5px;
        height: 5px;
        border-radius: 50%;
        background: #d6d3d1;
        animation: boot-pulse 1.2s ease-in-out infinite;
      }
      .boot-dot:nth-child(2) {
        animation-delay: 0.15s;
      }
      .boot-dot:nth-child(3) {
        animation-delay: 0.3s;
      }
      @keyframes boot-pulse {
        0%,
        80%,
        100% {
          opacity: 0.25;
        }
        40% {
          opacity: 1;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .boot-dot {
          animation: none;
          opacity: 0.5;
        }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="boot" aria-label="Loading">
        <span class="boot-dot"></span>
        <span class="boot-dot"></span>
        <span class="boot-dot"></span>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
